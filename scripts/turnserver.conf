# HerUnity coturn TURN server configuration
# Deploy: cp to /etc/turnserver.conf on cloud server

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=<PUBLIC_IP>    # Replace with actual cloud public IP

# Authentication — use long-term credential mechanism
lt-cred-mech
user=herunity:${TURN_PASSWORD}    # Set TURN_PASSWORD env var before running coturn

# Realm
realm=herunity.local

# Performance
total-quota=0
bps-capacity=0
stale-nonce=600
max-bps=10000000

# Logging
log-file=/data/logs/coturn.log
simple-log

# Security
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-0.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# TLS (optional, uncomment when cert ready)
# cert=/etc/letsencrypt/live/herunity.local/fullchain.pem
# pkey=/etc/letsencrypt/live/herunity.local/privkey.pem
